version: "3.8"

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    ports:
      - "8080:80"
    volumes:
      - nextcloud_data:/var/www/html

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - HNG-nginx-logs:/var/log/nginx

  detector:
    image: python:3.10
    volumes:
      - ./detector:/app
      - HNG-nginx-logs:/var/log/nginx:ro
    working_dir: /app
    command: python3 -u main.py

volumes:
  nextcloud_data:
  HNG-nginx-logs: