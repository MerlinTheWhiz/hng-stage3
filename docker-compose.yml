services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    environment:
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN:-metrics.example.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - HNG-nginx-logs:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - nextcloud

  detector:
    build:
      context: ./detector
    network_mode: host
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./detector:/app
      - HNG-nginx-logs:/var/log/nginx:ro
    working_dir: /app
    command: python3 -u main.py
    cap_add:
      - NET_ADMIN
    depends_on:
      - nginx

volumes:
  nextcloud_data:
  HNG-nginx-logs:
